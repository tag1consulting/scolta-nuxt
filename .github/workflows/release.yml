name: Release

# Tag push (vX.Y.Z) publishes to npm via Trusted Publishing (OIDC): no
# long-lived token, provenance attestation generated automatically. One-time
# setup on npmjs.com: package Settings -> Trusted Publisher -> GitHub Actions,
# repository tag1consulting/scolta-nuxt, workflow filename release.yml.
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # Trusted Publishing needs npm >= 11.5.1; runner images may bundle older.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm test
      # Publish-surface guards — the same gate ci.yml runs on every PR, run here
      # too so the published tarball is checked at the moment that actually
      # ships it: `check:publish` (publint + are-the-types-wrong) validates the
      # publish shape, `check:pack` asserts `npm pack` stays inside the `files`
      # allowlist and under the size cap. Without these a tagged commit could
      # publish a tarball the PR gate would have rejected.
      - run: npm run check:publish
      - run: npm run check:pack
      # Provenance is automatic under OIDC. Token fallback: set NODE_AUTH_TOKEN
      # from a granular automation token secret instead of the OIDC exchange.
      - run: npm publish
