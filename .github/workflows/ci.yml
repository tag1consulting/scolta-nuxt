name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    name: test (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      # Lockfiles here are generated with npm 11; npm 10 (bundled with the
      # Node 20/22 images) reconstructs optional peer deps differently and
      # rejects the lock at npm ci. Keep CI's npm aligned with the generator.
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run check:publish
